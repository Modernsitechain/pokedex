<section class="section">
  <div class="section__header">
    <h2 class="section__title">Base stats</h2>
  </div>
  @for (s of stats(); track s.name) {
    <div class="stat-row">
      <span class="stat-name ion-text-capitalize">{{ s.name }}</span>
      <span class="stat-value">{{ s.value }}</span>
      <div class="stat-bar">
        <div class="stat-bar-fill" [style.width.%]="statPercent(s.value)"></div>
      </div>
    </div>
  }
</section>
