<div class="poke-row">
  <ion-item
    button
    [detail]="true"
    lines="none"
    [routerLink]="['/detail', pokemon().id]"
    class="poke-row__item">
    <ion-thumbnail slot="start" class="poke-row__thumb">
      <img [src]="pokemon().imageUrl" [alt]="pokemon().name" loading="lazy" />
    </ion-thumbnail>
    <ion-label class="ion-text-capitalize poke-row__name">
      {{ pokemon().name }}
    </ion-label>
  </ion-item>

  <div class="poke-row__actions">
    <ng-content select="[actions]"></ng-content>
  </div>
</div>
