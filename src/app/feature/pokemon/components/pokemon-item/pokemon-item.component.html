<ion-item
  button
  [detail]="false"
  lines="none"
  [routerLink]="['/detail', pokemon().name]"
  class="poke-item">
  <ion-thumbnail slot="start" class="poke-item__thumb">
    <img [src]="pokemon().imageUrl" [alt]="pokemon().name" loading="lazy" />
  </ion-thumbnail>

  <ion-label class="ion-text-capitalize poke-item__name">
    {{ pokemon().name }}
  </ion-label>

  <div slot="end" class="poke-item__actions">
    <ng-content select="[actions]"></ng-content>
  </div>
</ion-item>
