<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Pokemon List</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar
      placeholder="Cari nama..."
      [debounce]="300"
      (ionInput)="onSearch($event)"
    >
    </ion-searchbar>
    <ion-buttons slot="end">
      <ion-button id="type-filter-trigger">
        <ion-icon slot="icon-only" name="filter"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-popover trigger="type-filter-trigger" [dismissOnSelect]="true">
  <ng-template>
    <ion-content>
      <ion-list>
        <ion-item button [detail]="false" (click)="selectType('')">
          <ion-label>Semua type</ion-label>
        </ion-item>
        @for (type of types; track type) {
          <ion-item button [detail]="false" (click)="selectType(type)">
            <ion-label class="ion-text-capitalize">{{ type }}</ion-label>
          </ion-item>
        }
      </ion-list>
    </ion-content>
  </ng-template>
</ion-popover>

<ion-content class="ion-padding">
  @if (typeLoading()) {
    <div class="ion-text-center ion-padding">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  } @else {
    <ion-list>
      @for (pokemon of visiblePokemons(); track pokemon.name) {
        <ion-item>
          <ion-thumbnail slot="start">
            <img [src]="pokemon.imageUrl" [alt]="pokemon.name" />
          </ion-thumbnail>
          <ion-label class="ion-text-capitalize">{{ pokemon.name }}</ion-label>

          <ion-button
            slot="end"
            fill="clear"
            (click)="
              $event.stopPropagation(); pokemonService.toggleFavorite(pokemon)
            "
          >
            <ion-icon
              slot="icon-only"
              [name]="
                pokemonService.isFavorite(pokemon.name)
                  ? 'heart'
                  : 'heart-outline'
              "
              [color]="
                pokemonService.isFavorite(pokemon.name) ? 'danger' : 'medium'
              "
            >
            </ion-icon>
          </ion-button>

          <ion-button
            slot="end"
            fill="clear"
            color="medium"
            [routerLink]="['/detail', pokemon.name]"
          >
            <ion-icon slot="icon-only" name="chevron-forward"></ion-icon>
          </ion-button>
        </ion-item>
      } @empty {
        <div class="ion-text-center ion-padding">Tidak ada Pokemon.</div>
      }
    </ion-list>

    @if (showInfiniteScroll()) {
      <ion-infinite-scroll (ionInfinite)="onInfinite($event)">
        <ion-infinite-scroll-content
          loadingSpinner="crescent"
          loadingText="Memuat lebih banyak..."
        >
        </ion-infinite-scroll-content>
      </ion-infinite-scroll>
    }
  }
</ion-content>
