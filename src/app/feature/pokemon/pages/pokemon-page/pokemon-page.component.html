<ion-header>
  <ion-toolbar>
    <ion-title>Pokemon List</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Search by name..."
      [debounce]="300"
      (ionInput)="onSearch($event)"
    >
    </ion-searchbar>
    <app-pokemon-filter-button slot="end" [(selectedType)]="selectedType" />
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (isLoading()) {
    <ion-list>
      @for (row of skeletonRows; track $index) {
        <ion-item lines="none">
          <app-pokemon-item-skeleton />
        </ion-item>
      }
    </ion-list>
  } @else {
    <ion-list lines="none">
      @for (pokemon of filteredPokemons(); track pokemon.id) {
        <app-pokemon-item [pokemon]="pokemon" />
      } @empty {
        <app-pokemon-empty-state />
      }
    </ion-list>

    @if (showInfiniteScroll()) {
      <ion-infinite-scroll (ionInfinite)="onInfinite($event)">
        <ion-infinite-scroll-content
          loadingSpinner="crescent"
          loadingText="Loading more..."
        >
        </ion-infinite-scroll-content>
      </ion-infinite-scroll>
    }
  }
</ion-content>
