frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build -- --configuration=$BUILD_CONFIGURATION
  artifacts:
    baseDirectory: /www
    files:
      - '**/*'
  cache:  
    paths:
      - '.npm/**/*'
      - 'node_modules/**/*'
